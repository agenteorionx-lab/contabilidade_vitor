name: Deploy to Contabo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build project
        run: |
          npm install
          npm run build
          # Copiar o nginx.conf para dentro da pasta dist para facilitar o envio
          cp ../nginx.conf ./dist/
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/*"
          target: "/var/www/contabilidade"
          strip_components: 2
          rm: true # LIMPA A PASTA ANTES DE ENVIAR

      - name: Configure Nginx and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Instalar Nginx se não existir
            if ! command -v nginx > /dev/null; then
              apt-get update
              apt-get install -y nginx
            fi

            # Criar arquivo de config direto
            cat << 'EOF' > /etc/nginx/sites-available/contabilidade
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name _;

                root /var/www/contabilidade;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                error_log /var/log/nginx/debug_contabilidade.log debug;
            }
            EOF

            # Ativar config
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/contabilidade /etc/nginx/sites-enabled/
            
            # Matar processos que roubam porta 80
            systemctl stop apache2 2>/dev/null || true
            if command -v fuser > /dev/null; then fuser -k 80/tcp 2>/dev/null || true; fi
            
            # Matar processos que roubam porta 80 (Apenas se necessário)
            systemctl stop apache2 2>/dev/null || true
            if command -v fuser > /dev/null; then fuser -k 80/tcp 2>/dev/null || true; fi
            if command -v fuser > /dev/null; then fuser -k 443/tcp 2>/dev/null || true; fi

            # Permissões
            chown -R www-data:www-data /var/www/contabilidade
            chmod -R 755 /var/www/contabilidade
            
            # Reiniciar Nginx
            nginx -t && systemctl restart nginx
            
            # --- DIAGNÓSTICO PROFUNDO ---
            echo "--- QUEM ESTÁ NA PORTA 80 e 443? ---"
            ss -tulpn | grep -E ':80|:443' || true
            echo "--- TEM DOCKER RODANDO? ---"
            if command -v docker > /dev/null; then docker ps || echo "Docker sem permissão"; fi
            echo "--- LOGS DO NGINX (Últimas 10 linhas) ---"
            tail -n 10 /var/log/nginx/error.log || true
            echo "--- TESTE LOCAL ---"
            curl -I http://localhost
