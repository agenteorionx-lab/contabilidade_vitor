name: Deploy to Contabo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build project
        run: |
          npm install
          npm run build
          # Copiar o nginx.conf para dentro da pasta dist para facilitar o envio
          cp ../nginx.conf ./dist/
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/*"
          target: "/var/www/contabilidade"
          strip_components: 2

      - name: Configure Nginx and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Instalar Nginx se não existir
            if ! command -v nginx > /dev/null; then
              apt-get update
              apt-get install -y nginx
            fi

            # Mover arquivos para o lugar certo
            # Agora o nginx.conf está na raiz de /var/www/contabilidade/
            if [ -f /var/www/contabilidade/nginx.conf ]; then
              mv /var/www/contabilidade/nginx.conf /etc/nginx/sites-available/contabilidade
            fi

            # Garantir que o nginx.conf aponte para a pasta certa (/var/www/contabilidade)
            if [ -f /etc/nginx/sites-available/contabilidade ]; then
              sed -i 's|root /var/www/contabilidade/dist;|root /var/www/contabilidade;|g' /etc/nginx/sites-available/contabilidade
              
              # Ativar configuração
              rm -f /etc/nginx/sites-enabled/default
              ln -sf /etc/nginx/sites-available/contabilidade /etc/nginx/sites-enabled/
            fi

            # Derrubar apache e nginx para garantir que a porta 80 está livre
            systemctl stop apache2 2>/dev/null || true
            systemctl stop nginx 2>/dev/null || true
            fuser -k 80/tcp 2>/dev/null || true
            
            # Verificar se a configuração está ok e iniciar
            nginx -t && systemctl start nginx
            
            # Ajustar permissões finais
            chown -R www-data:www-data /var/www/contabilidade
            chmod -R 755 /var/www/contabilidade
