name: Deploy to Contabo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build project
        run: npm run build
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/*,nginx.conf"
          target: "/var/www/contabilidade"
          strip_components: 2

      - name: Configure Nginx and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Instalar Nginx se não existir
            if ! command -v nginx > /dev/null; then
              apt-get update
              apt-get install -y nginx
            fi

            # Mover arquivos para o lugar certo
            # scp-action coloca em /var/www/contabilidade/nginx.conf
            mv /var/www/contabilidade/nginx.conf /etc/nginx/sites-available/contabilidade

            # Criar pasta /var/www/contabilidade/dist se não existir (para o root do nginx.conf)
            mkdir -p /var/www/contabilidade/dist
            # Mover o conteúdo para dentro de dist para bater com o nginx.conf antigo ou ajustar nginx.conf
            # Para simplificar, vamos garantir que o nginx.conf aponte para /var/www/contabilidade
            sed -i 's|root /var/www/contabilidade/dist;|root /var/www/contabilidade/frontend/dist;|g' /etc/nginx/sites-available/contabilidade
            # Na verdade, scp enviou frontend/dist/* para /var/www/contabilidade/
            # Então os arquivos estão direto em /var/www/contabilidade/
            sed -i 's|root /var/www/contabilidade/dist;|root /var/www/contabilidade;|g' /etc/nginx/sites-available/contabilidade

            # Resetar Nginx
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/contabilidade /etc/nginx/sites-enabled/
            
            # Derrubar apache se existir
            systemctl stop apache2 2>/dev/null || true
            
            # Reiniciar Nginx
            systemctl restart nginx
