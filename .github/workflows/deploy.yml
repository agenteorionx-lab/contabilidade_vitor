name: Deploy to Contabo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build project
        run: |
          npm install
          npm run build
          # Copiar o nginx.conf para dentro da pasta dist para facilitar o envio
          cp ../nginx.conf ./dist/
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/*"
          target: "/var/www/contabilidade"
          strip_components: 2 # Isso faz os arquivos do dist irem direto para /var/www/contabilidade/

      - name: Configure Nginx and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Instalar Nginx se não existir
            if ! command -v nginx > /dev/null; then
              apt-get update
              apt-get install -y nginx
            fi

            # Criar arquivo de config direto com caminhos absolutos e debug log
            cat << 'EOF' > /etc/nginx/sites-available/contabilidade
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name _;

                root /var/www/contabilidade;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                error_log /var/log/nginx/debug_contabilidade.log debug;
            }
            EOF

            # Garantir que a pasta existe e tem permissão
            mkdir -p /var/www/contabilidade
            
            # Limpar lixo de deploys anteriores (apenas se for lixo conhecido)
            # A gente sabe que scp-action joga os arquivos na raiz de target se strip_components for usado certo
            
            # Resetar Nginx vinculando a config
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/contabilidade /etc/nginx/sites-enabled/
            
            # Matar processos que roubam a porta 80
            systemctl stop apache2 2>/dev/null || true
            fuser -k 80/tcp 2>/dev/null || true
            
            # Aplicar permissões
            chown -R www-data:www-data /var/www/contabilidade
            chmod -R 755 /var/www/contabilidade
            
            # Reiniciar
            systemctl restart nginx
