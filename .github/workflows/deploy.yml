name: Deploy to Contabo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build project
        run: |
          npm install
          npm run build
          # Copiar o nginx.conf para dentro da pasta dist para facilitar o envio
          cp ../nginx.conf ./dist/
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/*,frontend/server.js,frontend/package.json"
          target: "/root/contabilidade"
          strip_components: 1

      - name: Start Dashboard with PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root/contabilidade
            
            # Instalar dependências completas para o server
            npm install express path
            
            # Rodar Dashboard no PM2
            pm2 delete contabilidade 2>/dev/null || true
            pm2 start server.js --name "contabilidade"
            
            # ESPERAR O BOOT E VER LOGS
            sleep 5
            echo "--- STATUS PM2 ---"
            pm2 status
            echo "--- ERROS PM2 (Se houver) ---"
            pm2 logs contabilidade --lines 20 --no-daemon &
            sleep 3
            pkill -f "pm2 logs"
            
            echo "--- CHECANDO PORTA 3001 LOCALMENTE ---"
            curl -I http://localhost:3001 || echo "ERRO: O servidor não iniciou na porta 3001"
            
            pm2 save
            echo "--- DEPLOY FINALIZADO ---"
